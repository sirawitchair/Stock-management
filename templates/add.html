<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เพิ่มสินค้า - Stock System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i>เพิ่มไอเทมใหม่เข้าสต็อก</h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="/add" method="post" enctype="multipart/form-data">
                            <div class="row g-3">
                                <!-- ข้อมูลพื้นฐาน -->
                                <div class="col-md-8">
                                    <label class="form-label fw-bold">ชื่อสินค้า</label>
                                    <input type="text" name="name" class="form-control" placeholder="ระบุชื่อไอเทม" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">ราคา (บาท)</label>
                                    <input type="number" name="price" class="form-control" placeholder="0" required>
                                </div>

                                <!-- รายละเอียดไอเทม -->
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">เพศ</label>
                                    <select name="gender" class="form-select">
                                        <option value="ชาย">ชาย</option>
                                        <option value="หญิง">หญิง</option>
                                        <option value="ทุกเพศ">ทุกเพศ</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">หมวดหมู่</label>
                                    <select name="category" class="form-select">
                                        <option value="คอ">คอ</option>
                                        <option value="ใบหน้า">ใบหน้า</option>
                                        <option value="ผม">ผม</option>
                                        <option value="หมวก">หมวก</option>
                                        <option value="หลัง">หลัง</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold">ระยะเวลา</label>
                                    <select name="duration" class="form-select">
                                        <option value="ถาวร">ถาวร</option>
                                        <option value="30 วัน">30 วัน</option>
                                        <option value="7 วัน">7 วัน</option>
                                    </select>
                                </div>

                                <!-- การจัดการสถานะ -->
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">ระดับ (Rarity)</label>
                                    <select name="rarity" class="form-select">
                                        <option value="SSS">SSS</option>
                                        <option value="SS+">SS+</option>
                                        <option value="SS">SS</option>
                                        <option value="S">S</option>
                                        <option value="A">A</option>
                                        <option value="B">B</option>
                                    </select>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-primary">สถานะสต็อก</label>
                                    <select name="is_active" class="form-select border-primary">
                                        <option value="True">พร้อมจำหน่าย (In Stock)</option>
                                        <option value="False">หมด (Out of Stock)</option>
                                    </select>
                                </div>

                                <!-- อัปโหลดรูปภาพ -->
                                <div class="col-md-12">
                                    <label class="form-label fw-bold">อัปโหลดรูปภาพ (เลือกได้สูงสุด 3 รูป)</label>
                                    <div class="input-group">
                                        <span class="input-group-text"><i class="bi bi-image"></i></span>
                                        <input type="file" id="fileInput" name="files" class="form-control" multiple accept="image/*" required>
                                    </div>
                                    <div id="previewContainer" class="d-flex gap-2 mt-2"></div>
                                    <div class="form-text text-muted">
                                        * กด Ctrl ค้างไว้เพื่อเลือกหลายรูปพร้อมกัน
                                    </div>
                                </div>

                                <div class="col-12 mt-4 pt-3 border-top d-flex justify-content-end">
                                    <a href="/" class="btn btn-light me-2">ยกเลิก</a>
                                    <button type="submit" class="btn btn-primary px-5 shadow-sm">
                                        <i class="bi bi-save me-2"></i>บันทึกข้อมูลไอเทม
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ฟังก์ชันช่วยแสดงตัวอย่างรูปภาพ
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const container = document.getElementById('previewContainer');
            container.innerHTML = '';
            const files = e.target.files;
            
            if (files.length > 3) {
                alert('เลือกได้สูงสุด 3 รูปเท่านั้น ระบบจะใช้เพียง 3 รูปแรก');
            }

            for (let i = 0; i < Math.min(files.length, 3); i++) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    img.style.width = '80px';
                    img.style.height = '80px';
                    img.style.objectFit = 'cover';
                    img.classList.add('rounded', 'border');
                    container.appendChild(img);
                }
                reader.readAsDataURL(files[i]);
            }
        });
    </script>
</body>
</html>
